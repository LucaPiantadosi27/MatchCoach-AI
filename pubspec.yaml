name: lavagna_tattica
description: "Lavagna Tattica - App per allenatori di calcio a 5"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  supabase_flutter: ^2.8.3
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  video_player: ^2.9.2
  ffmpeg_kit_flutter_min_gpl: ^6.0.3
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
